name: Build site from Notion
on:
  schedule:
    - cron: '0 * * * *'   # 毎時。Notionに足すと最大1時間で反映
  workflow_dispatch:        # 「Run workflow」で手動・即時更新も可
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build index.html
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node build.js
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update site from Notion"
          git push
